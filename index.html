function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) { const p = JSON.parse(raw); if (Array.isArray(p)) return p; }
  } catch(e) {}
  return EMBEDDED_DATA;
}
function saveData(data) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {} }

function getLinkIcon(url) {
  if (!url) return 'fa-link';
  if (url.includes('youtube.com') || url.includes('youtu.be')) return 'fa-brands fa-youtube';
  if (url.includes('drive.google.com')) return 'fa-brands fa-google-drive';
  if (url.includes('sharepoint.com') || url.includes('onedrive')) return 'fa-brands fa-microsoft';
  return 'fa-link';
}
function getLinkColor(url) {
  if (!url) return 'text-gray-500';
  if (url.includes('youtube.com') || url.includes('youtu.be')) return 'text-red-500';
  if (url.includes('drive.google.com')) return 'text-green-500';
  if (url.includes('sharepoint.com') || url.includes('onedrive')) return 'text-blue-500';
  return 'text-indigo-500';
}

function LinkItem({ link }) {
  return (
    <div className="flex items-center gap-2 py-1.5 px-3 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-all">
      <i className={getLinkIcon(link.url)+' '+getLinkColor(link.url)+' text-sm w-4 flex-shrink-0'}></i>
      <a href={link.url} target="_blank" rel="noopener noreferrer" className="flex-1 text-sm text-gray-700 dark:text-gray-300 hover:text-indigo-600 dark:hover:text-indigo-400 truncate">{link.name}</a>
    </div>
  );
}

function SectionItem({ section }) {
  const [collapsed, setCollapsed] = useState(false);
  return (
    <div className="border border-gray-200 dark:border-gray-700 rounded-xl overflow-hidden mb-3">
      <div className="flex items-center gap-2 px-4 py-3 bg-gray-50 dark:bg-gray-800/80 cursor-pointer" onClick={() => setCollapsed(!collapsed)}>
        <i className={'fa fa-chevron-'+(collapsed?'left':'down')+' text-xs text-gray-400'}></i>
        <span className="flex-1 font-semibold text-gray-800 dark:text-white text-sm">{section.name}</span>
        <span className="text-xs text-indigo-500 bg-indigo-100 dark:bg-indigo-900/40 px-2 py-0.5 rounded-full">{(section.links||[]).length} رابط</span>
      </div>
      {!collapsed && (
        <div className="px-2 py-2 bg-white dark:bg-gray-900">
          {(section.links||[]).length === 0 ? <p className="text-center text-sm text-gray-400 py-3">لا توجد روابط</p> :
            (section.links||[]).map(link => <LinkItem key={link.id} link={link} />)
          }
        </div>
      )}
    </div>
  );
}

function NoteCard({ note, colorClass }) {
  const date = new Date(note.updatedAt || note.createdAt);
  return (
    <div className={colorClass+' rounded-2xl p-4 shadow-md hover:shadow-lg hover:-translate-y-1 transition-all'} style={{minHeight:'120px'}}>
      <p className="text-sm font-medium leading-relaxed whitespace-pre-wrap break-words pb-6">{note.content}</p>
      <span className="absolute bottom-3 left-3 text-xs opacity-60">{date.toLocaleDateString('ar-EG',{year:'numeric',month:'short',day:'numeric'})}</span>
    </div>
  );
}

function CourseDetail({ course, onBack }) {
  const [activeTab, setActiveTab] = useState('sections');
  const totalLinks = (course.sections||[]).reduce((a,s) => a + (s.links||[]).length, 0);
  return (
    <div className="fade-in">
      <button onClick={onBack} className="flex items-center gap-2 text-indigo-500 hover:text-indigo-700 font-medium mb-4 group">
        <i className="fa fa-arrow-right group-hover:translate-x-1 transition-transform"></i><span>العودة للرئيسية</span>
      </button>
      <div className={'bg-gradient-to-l '+(course.color||'from-indigo-500 to-purple-600')+' rounded-2xl p-6 text-white shadow-lg relative overflow-hidden'}>
        {course.image && <div className="absolute inset-0 opacity-20 bg-cover bg-center" style={{backgroundImage:'url('+course.image+')'}}></div>}
        <div className="relative flex items-center gap-4">
          <div className="w-14 h-14 bg-white/20 rounded-2xl flex items-center justify-center text-2xl overflow-hidden">
            {course.image ? <img src={course.image} alt="" className="w-full h-full object-cover rounded-2xl" /> : <i className={'fa '+(course.icon||'fa-book')}></i>}
          </div>
          <div>
            <h1 className="text-2xl font-bold">{course.title}</h1>
            <p className="text-white/80 text-sm mt-1">{course.doc}</p>
            <div className="flex gap-4 mt-2 text-sm text-white/70">
              <span><i className="fa fa-layer-group ml-1"></i>{(course.sections||[]).length} قسم</span>
              <span><i className="fa fa-link ml-1"></i>{totalLinks} رابط</span>
              <span><i className="fa fa-sticky-note ml-1"></i>{(course.notes||[]).length} ملاحظة</span>
            </div>
          </div>
        </div>
      </div>
      <div className="flex gap-2 mb-6 mt-6">
        {[{k:'sections',icon:'fa-layer-group',label:'الأقسام والروابط'},{k:'notes',icon:'fa-sticky-note',label:'الملاحظات'}].map(tab => (
          <button key={tab.k} onClick={()=>setActiveTab(tab.k)} className={'flex items-center gap-2 px-5 py-2.5 rounded-xl font-semibold text-sm transition-all '+(activeTab===tab.k?'bg-gradient-to-r from-indigo-500 to-purple-600 text-white shadow-md':'bg-white dark:bg-gray-800 text-gray-600 dark:text-gray-300 border border-gray-200 dark:border-gray-700')}>
            <i className={'fa '+tab.icon}></i>{tab.label}
          </button>
        ))}
      </div>
      {activeTab === 'sections' && (
        <div>
          <h2 className="text-lg font-bold text-gray-800 dark:text-white mb-4">الأقسام</h2>
          {(course.sections||[]).length === 0 ? <p className="text-center text-gray-400 py-16">لا توجد أقسام</p> :
            course.sections.map(sec => <SectionItem key={sec.id} section={sec} />)}
        </div>
      )}
      {activeTab === 'notes' && (
        <div>
          <h2 className="text-lg font-bold text-gray-800 dark:text-white mb-4">الملاحظات</h2>
          {(course.notes||[]).length === 0 ? <p className="text-center text-gray-400 py-16">لا توجد ملاحظات</p> :
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
              {course.notes.map((note,i) => <NoteCard key={note.id} note={note} colorClass={NOTE_COLORS[i%NOTE_COLORS.length]} />)}
            </div>}
        </div>
      )}
    </div>
  );
}

function CourseCard({ course, onClick, index }) {
  const totalLinks = (course.sections||[]).reduce((a,s) => a + (s.links||[]).length, 0);
  const colorClass = course.color || COURSE_COLORS[index % COURSE_COLORS.length];
  return (
    <div className="card-hover cursor-pointer rounded-2xl overflow-hidden border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 shadow-sm hover:shadow-xl transition-all" onClick={onClick}>
      <div className={'h-2 bg-gradient-to-r '+colorClass}></div>
      <div className="p-5">
        <div className="flex items-start justify-between mb-4">
          <div className={'w-12 h-12 bg-gradient-to-br '+colorClass+' rounded-2xl flex items-center justify-center text-white text-xl shadow-md overflow-hidden'}>
            {course.image ? <img src={course.image} alt="" className="w-full h-full object-cover" /> : <i className={'fa '+(course.icon||COURSE_ICONS[index%COURSE_ICONS.length])}></i>}
          </div>
        </div>
        <h3 className="font-bold text-gray-800 dark:text-white text-base mb-1">{course.title}</h3>
        <p className="text-xs text-gray-500 dark:text-gray-400 mb-4 line-clamp-2">{course.doc}</p>
        <div className="flex items-center gap-3 text-xs text-gray-400 border-t border-gray-100 dark:border-gray-700 pt-3">
          <span className="flex items-center gap-1"><i className="fa fa-layer-group text-indigo-400"></i>{(course.sections||[]).length} قسم</span>
          <span className="flex items-center gap-1"><i className="fa fa-link text-cyan-400"></i>{totalLinks} رابط</span>
          {(course.notes||[]).length > 0 && <span className="flex items-center gap-1 mr-auto"><i className="fa fa-sticky-note text-amber-400"></i>{course.notes.length}</span>}
        </div>
      </div>
    </div>
  );
}

function App() {
  const [courses, setCourses] = useState(() => loadData());
  const [selectedCourseId, setSelectedCourseId] = useState(null);
  const [darkMode, setDarkMode] = useState(() => { try { return localStorage.getItem('darkMode_v2') === 'true'; } catch(e) { return false; } });

  useEffect(() => { saveData(courses); }, [courses]);
  useEffect(() => {
    try { localStorage.setItem('darkMode_v2', darkMode); } catch(e) {}
    if (darkMode) document.documentElement.classList.add('dark');
    else document.documentElement.classList.remove('dark');
  }, [darkMode]);

  const selectedCourse = courses.find(c => c.id === selectedCourseId);

  return (
    <div className={'min-h-screen flex flex-col transition-colors duration-300 '+(darkMode?'dark bg-gray-950':'bg-gray-50')+' dot-pattern'}>
      <header className="sticky top-0 z-50 glass border-b border-gray-200 dark:border-gray-800 bg-white/80 dark:bg-gray-900/80">
        <div className="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between gap-4">
          <div className="flex items-center gap-3">
            {selectedCourse && <button onClick={() => setSelectedCourseId(null)} className="w-9 h-9 flex items-center justify-center rounded-xl hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-500"><i className="fa fa-arrow-right"></i></button>}
            <div className="flex items-center gap-2">
              <div className="w-9 h-9 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-xl flex items-center justify-center text-white"><i className="fa fa-graduation-cap text-sm"></i></div>
              <div>
                <h1 className="text-base font-bold text-gray-800 dark:text-white leading-tight">{selectedCourse ? selectedCourse.title : 'مواد اعدادي هندسة'}</h1>
                {!selectedCourse && <p className="text-xs text-gray-400 hidden sm:block">نسخة محفوظة - للقراءة فقط</p>}
              </div>
            </div>
          </div>
          <button onClick={() => setDarkMode(!darkMode)} className="w-9 h-9 flex items-center justify-center rounded-xl bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-yellow-400 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
            <i className={'fa '+(darkMode?'fa-sun':'fa-moon')}></i>
          </button>
        </div>
      </header>
      <main className="flex-1 max-w-7xl w-full mx-auto px-4 py-8">
        {selectedCourse ? <CourseDetail course={selectedCourse} onBack={() => setSelectedCourseId(null)} /> : (
          <div className="fade-in">
            <div className="grid grid-cols-3 gap-3 mb-8">
              {[{label:'المقررات',value:courses.length,icon:'fa-book',color:'from-indigo-500 to-purple-600'},{label:'الأقسام',value:courses.reduce((a,c)=>a+(c.sections||[]).length,0),icon:'fa-layer-group',color:'from-cyan-500 to-blue-600'},{label:'الروابط',value:courses.reduce((a,c)=>a+(c.sections||[]).reduce((b,s)=>b+(s.links||[]).length,0),0),icon:'fa-link',color:'from-emerald-500 to-teal-600'}].map(stat => (
                <div key={stat.label} className="bg-white dark:bg-gray-800 rounded-2xl p-4 shadow-sm border border-gray-100 dark:border-gray-700">
                  <div className={'w-9 h-9 bg-gradient-to-br '+stat.color+' rounded-xl flex items-center justify-center text-white mb-2'}><i className={'fa '+stat.icon+' text-sm'}></i></div>
                  <div className="text-2xl font-bold text-gray-800 dark:text-white">{stat.value}</div>
                  <div className="text-xs text-gray-500 font-medium">{stat.label}</div>
                </div>
              ))}
            </div>
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
              {courses.map((course, idx) => <CourseCard key={course.id} course={course} index={idx} onClick={() => setSelectedCourseId(course.id)} />)}
            </div>
          </div>
        )}
      </main>
      <footer className="mt-auto text-center py-4 text-xs text-gray-400 dark:text-gray-600 border-t border-gray-100 dark:border-gray-800 bg-white/50 dark:bg-gray-900/50 glass">
       made by abdallah elmohammady
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
