        // Simple Toast Component
        const Toast = ({ message, type, onClose }) => {
            useEffect(() => {
                const timer = setTimeout(onClose, 3000);
                return () => clearTimeout(timer);
            }, [onClose]);

            const bgColors = {
                success: 'border-green-500',
                error: 'border-red-500',
                info: 'border-blue-500'
            };

            return (
                <div className={`toast ${bgColors[type] || 'border-primary'}`}>
                    <i className={`fa-solid ${type === 'success' ? 'fa-check-circle text-green-500' : type === 'error' ? 'fa-circle-exclamation text-red-500' : 'fa-info-circle text-blue-500'}`}></i>
                    <span>{message}</span>
                </div>
            );
        };

        function CCEHub() {
            // FIX: Inject Unique ID into LocalStorage keys
            const APP_ID = "mofwte1a2wg5hmwwipc";

            const [allCourses, setAllCourses] = useState(() => {
                if (typeof window === 'undefined') return defaultCourses;
                try {
                    // Use unique key: 'allCourses_' + APP_ID
                    const storedCourses = localStorage.getItem('allCourses_' + APP_ID);
                    if (storedCourses) {
                        const parsed = JSON.parse(storedCourses);
                        const sanitized = parsed.map(c => ({...c, notes: Array.isArray(c.notes) ? c.notes : []}));
                        return sanitized.length > 0 ? sanitized : defaultCourses;
                    }
                } catch (e) { console.error(e); }
                return defaultCourses;
            });

            const [currentCourseId, setCurrentCourseId] = useState(null)
            const [view, setView] = useState('home')
            const [searchTerm, setSearchTerm] = useState('')
            const [currentIconBase64, setCurrentIconBase64] = useState(null)
            const [theme, setTheme] = useState(() => {
                if (typeof window !== 'undefined') {
                    // Use unique key: 'theme_' + APP_ID
                    return (localStorage.getItem('theme_' + APP_ID)) || 'light'
                }
                return 'light'
            })

            const [toasts, setToasts] = useState([])

            const addToast = (message, type = 'info') => {
                const id = Date.now()
                setToasts(prev => [...prev, { id, message, type }])
            }

            const removeToast = (id) => {
                setToasts(prev => prev.filter(t => t.id !== id))
            }

            // Note Modal State
            const [noteModalOpen, setNoteModalOpen] = useState(false)
            const [editingNoteId, setEditingNoteId] = useState(null)
            const [tempNoteContent, setTempNoteContent] = useState('')

            // Modals state
            const [courseModalOpen, setCourseModalOpen] = useState(false)
            const [linkModalOpen, setLinkModalOpen] = useState(false)
            const [editLinkModalOpen, setEditLinkModalOpen] = useState(false)
            const [editingCourseId, setEditingCourseId] = useState(null)
            const [editingSectionIndex, setEditingSectionIndex] = useState(null)
            const [editingLinkIndex, setEditingLinkIndex] = useState(null)
            const [targetSectionIndex, setTargetSectionIndex] = useState(null)

            // Form state
            const [courseName, setCourseName] = useState('')
            const [courseDoc, setCourseDoc] = useState('')
            const [linkName, setLinkName] = useState('')
            const [linkUrl, setLinkUrl] = useState('')
            const [editLinkName, setEditLinkName] = useState('')
            const [editLinkUrl, setEditLinkUrl] = useState('')

            // Drag and drop state
            const [draggedLinkInfo, setDraggedLinkInfo] = useState(null)
            const [draggedCourseIndex, setDraggedCourseIndex] = useState(null)
            const [draggedSectionIndex, setDraggedSectionIndex] = useState(null)

            const fileInputRef = useRef(null)

            // Effects
            useEffect(() => {
                try {
                    // Save to unique key
                    localStorage.setItem('allCourses_' + APP_ID, JSON.stringify(allCourses))
                } catch (e) {
                    addToast('تنبيه: مساحة التخزين ممتلئة.', 'error')
                }
            }, [allCourses])

            useEffect(() => {
                // Save theme to unique key
                localStorage.setItem('theme_' + APP_ID, theme)
                if(theme === 'dark') {
                    document.body.classList.add('dark-mode')
                } else {
                    document.body.classList.remove('dark-mode')
                }
            }, [theme])

            // Note Handlers
            const openAddNoteModal = () => {
                setEditingNoteId(null)
                setTempNoteContent('')
                setNoteModalOpen(true)
            }

            const openEditNoteModal = (note) => {
                setEditingNoteId(note.id)
                setTempNoteContent(note.content)
                setNoteModalOpen(true)
            }

            const saveNote = () => {
                if (!tempNoteContent.trim()) return

                setAllCourses(prev => prev.map(course => {
                    if (course.id === currentCourseId) {
                        let newNotes = [...course.notes]
                        if (editingNoteId) {
                            newNotes = newNotes.map(n => n.id === editingNoteId 
                                ? { ...n, content: tempNoteContent.trim(), updatedAt: new Date().toISOString() } 
                                : n)
                        } else {
                            newNotes.push({
                                id: Date.now(),
                                content: tempNoteContent.trim(),
                                createdAt: new Date().toISOString()
                            })
                        }
                        return { ...course, notes: newNotes }
                    }
                    return course
                }))
                setNoteModalOpen(false)
                addToast('تم حفظ الملاحظة', 'success')
            }

            const deleteNote = (noteId) => {
                if(confirm('هل أنت متأكد من حذف هذه الملاحظة؟')) {
                    setAllCourses(prev => prev.map(course => {
                        if (course.id === currentCourseId) {
                            return { ...course, notes: course.notes.filter(n => n.id !== noteId) }
                        }
                        return course
                    }))
                    addToast('تم حذف الملاحظة', 'info')
                }
            }

            const formatDate = (isoString) => {
                const date = new Date(isoString)
                return date.toLocaleDateString('ar-EG', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit' })
            }

            // Helpers
            const getIcon = (name) => {
                const n = name.toLowerCase()
                if (n.includes('رياض') || n.includes('math')) return 'fa-calculator'
                if (n.includes('فيز') || n.includes('phys')) return 'fa-bolt'
                if (n.includes('دائر') || n.includes('circ') || n.includes('كهرب')) return 'fa-plug-circle-bolt'
                if (n.includes('إلكترون') || n.includes('electr')) return 'fa-memory'
                if (n.includes('لوجيك') || n.includes('log') || n.includes('برمجة') || n.includes('prog')) return 'fa-microchip'
                if (n.includes('احتمال') || n.includes('stat')) return 'fa-chart-pie'
                if (n.includes('امتحان') || n.includes('exam') || n.includes('مود')) return 'fa-file-shield'
                return 'fa-book'
            }

            const toggleTheme = () => {
                setTheme(prev => prev === 'light' ? 'dark' : 'light')
            }

            const openCourseModal = () => {
                setEditingCourseId(null)
                setCurrentIconBase64(null)
                setCourseName('')
                setCourseDoc('')
                setCourseModalOpen(true)
            }

            const openEditCourseModal = (courseId) => {
                const course = allCourses.find(c => c.id === courseId)
                if (!course) return
                setEditingCourseId(courseId)
                setCurrentIconBase64(null)
                setCourseName(course.title)
                setCourseDoc(course.doc)
                setCourseModalOpen(true)
            }

            const saveCourseData = () => {
                if (!courseName.trim() || !courseDoc.trim()) {
                    addToast('يرجى ملء جميع الحقول', 'error')
                    return
                }

                if (editingCourseId) {
                    setAllCourses(prev => prev.map(course => {
                        if (course.id === editingCourseId) {
                            return {
                                ...course,
                                title: courseName.trim(),
                                doc: courseDoc.trim(),
                                icon: currentIconBase64 || course.icon
                            }
                        }
                        return course
                    }))
                    addToast('تم تعديل المقرر', 'success')
                } else {
                    const newCourse = {
                        id: `course-${Date.now()}`,
                        title: courseName.trim(),
                        doc: courseDoc.trim(),
                        icon: currentIconBase64 || getIcon(courseName),
                        sections: [],
                        notes: []
                    }
                    setAllCourses(prev => [...prev, newCourse])
                    addToast('تمت إضافة المقرر الجديد', 'success')
                }
                setCourseModalOpen(false)
            }

            const deleteCourse = (courseId) => {
                if (confirm('هل أنت متأكد من الحذف؟')) {
                    setAllCourses(prev => prev.filter(c => c.id !== courseId))
                    if (currentCourseId === courseId) {
                        showHome()
                    }
                    addToast('تم حذف المقرر', 'info')
                }
            }

            const openDetail = (courseId) => {
                setCurrentCourseId(courseId)
                setView('detail')
            }

            const showHome = () => {
                setCurrentCourseId(null)
                setView('home')
            }

            const openLinkModal = (sectionIndex = null) => {
                setTargetSectionIndex(sectionIndex)
                setLinkName('')
                setLinkUrl('')
                setLinkModalOpen(true)
            }

            const saveLinkData = () => {
                if (!linkName.trim() || !linkUrl.trim()) {
                    addToast('يرجى ملء البيانات', 'error')
                    return
                }

                setAllCourses(prev => prev.map(course => {
                    if (course.id === currentCourseId) {
                        if (targetSectionIndex !== null) {
                            const newSections = [...course.sections]
                            newSections[targetSectionIndex].links.push({
                                name: linkName.trim(),
                                url: linkUrl.trim()
                            })
                            return { ...course, sections: newSections }
                        } else {
                            return {
                                ...course,
                                sections: [
                                    ...course.sections,
                                    {
                                        name: `قسم جديد ${course.sections.length + 1}`,
                                        badge: 'مضاف',
                                        links: [{ name: linkName.trim(), url: linkUrl.trim() }]
                                    }
                                ]
                            }
                        }
                    }
                    return course
                }))
                setLinkModalOpen(false)
                addToast('تم حفظ الرابط', 'success')
            }

            const deleteLink = (courseId, sectionIndex, linkIndex) => {
                if (confirm('حذف هذا الرابط؟')) {
                    setAllCourses(prev => prev.map(course => {
                        if (course.id === courseId) {
                            const newSections = [...course.sections]
                            newSections[sectionIndex].links.splice(linkIndex, 1)
                            if (newSections[sectionIndex].links.length === 0) {
                                newSections.splice(sectionIndex, 1)
                            }
                            return { ...course, sections: newSections }
                        }
                        return course
                    }))
                    addToast('تم حذف الرابط', 'info')
                }
            }

            const openEditLinkModal = (courseId, sectionIndex, linkIndex) => {
                const course = allCourses.find(c => c.id === courseId)
                if (!course) return
                const link = course.sections[sectionIndex].links[linkIndex]
                setEditingCourseId(courseId)
                setEditingSectionIndex(sectionIndex)
                setEditingLinkIndex(linkIndex)
                setEditLinkName(link.name)
                setEditLinkUrl(link.url)
                setEditLinkModalOpen(true)
            }

            const saveEditedLink = () => {
                if (!editLinkName.trim() || !editLinkUrl.trim()) {
                    addToast('يرجى ملء البيانات', 'error')
                    return
                }
                if (editingCourseId !== null && editingSectionIndex !== null && editingLinkIndex !== null) {
                    setAllCourses(prev => prev.map(course => {
                        if (course.id === editingCourseId) {
                            const newSections = [...course.sections]
                            newSections[editingSectionIndex].links[editingLinkIndex] = {
                                name: editLinkName.trim(),
                                url: editLinkUrl.trim()
                            }
                            return { ...course, sections: newSections }
                        }
                        return course
                    }))
                }
                setEditLinkModalOpen(false)
                addToast('تم تعديل الرابط', 'success')
            }

            const editSectionName = (courseId, sectionIndex) => {
                const course = allCourses.find(c => c.id === courseId)
                if (!course) return
                const newName = prompt('أدخل الاسم الجديد للخانة:', course.sections[sectionIndex].name)
                if (newName && newName.trim()) {
                    setAllCourses(prev => prev.map(course => {
                        if (course.id === courseId) {
                            const newSections = [...course.sections]
                            newSections[sectionIndex].name = newName.trim()
                            return { ...course, sections: newSections }
                        }
                        return course
                    }))
                }
            }

            const deleteSection = (courseId, sectionIndex) => {
                if (confirm('هل أنت متأكد من حذف هذه الخانة؟')) {
                    setAllCourses(prev => prev.map(course => {
                        if (course.id === courseId) {
                            const newSections = [...course.sections]
                            newSections.splice(sectionIndex, 1)
                            return { ...course, sections: newSections }
                        }
                        return course
                    }))
                    addToast('تم حذف الخانة', 'info')
                }
            }

            // Drag & Drop Handlers
            const handleLinkDragStart = (e, sectionIndex, linkIndex) => {
                setDraggedLinkInfo({ sectionIndex, linkIndex })
                e.dataTransfer.effectAllowed = 'move'
            }

            const handleLinkDragOver = (e) => {
                e.preventDefault()
                e.dataTransfer.dropEffect = 'move'
            }

            const handleLinkDrop = (e, targetSectionIndex, targetLinkIndex) => {
                e.preventDefault()
                if (!draggedLinkInfo || !currentCourseId) return
                const { sectionIndex: sourceSectionIndex, linkIndex: sourceLinkIndex } = draggedLinkInfo

                if (sourceSectionIndex === targetSectionIndex && sourceLinkIndex === targetLinkIndex) {
                    setDraggedLinkInfo(null)
                    return
                }

                setAllCourses(prev => prev.map(course => {
                    if (course.id === currentCourseId) {
                        const newSections = [...course.sections]
                        const [draggedLink] = newSections[sourceSectionIndex].links.splice(sourceLinkIndex, 1)
                        newSections[targetSectionIndex].links.splice(targetLinkIndex, 0, draggedLink)
                        const filteredSections = newSections.filter(s => s.links.length > 0)
                        return { ...course, sections: filteredSections }
                    }
                    return course
                }))
                setDraggedLinkInfo(null)
            }

            const handleCourseDragStart = (e, courseIndex) => {
                setDraggedCourseIndex(courseIndex)
                e.dataTransfer.effectAllowed = 'move'
            }

            const handleCourseDragOver = (e) => {
                e.preventDefault()
                e.dataTransfer.dropEffect = 'move'
            }

            const handleCourseDrop = (e, targetIndex) => {
                e.preventDefault()
                if (draggedCourseIndex === null || draggedCourseIndex === targetIndex) {
                    setDraggedCourseIndex(null)
                    return
                }
                setAllCourses(prev => {
                    const newCourses = [...prev]
                    const [draggedCourse] = newCourses.splice(draggedCourseIndex, 1)
                    newCourses.splice(targetIndex, 0, draggedCourse)
                    return newCourses
                })
                setDraggedCourseIndex(null)
            }

            const handleSectionDragStart = (e, sectionIndex) => {
                setDraggedSectionIndex(sectionIndex)
                e.dataTransfer.effectAllowed = 'move'
            }

            const handleSectionDragOver = (e) => {
                e.preventDefault()
                e.dataTransfer.dropEffect = 'move'
            }

            const handleSectionDrop = (e, targetIndex) => {
                e.preventDefault()
                if (draggedSectionIndex === null || draggedSectionIndex === targetIndex) {
                    setDraggedSectionIndex(null)
                    return
                }
                setAllCourses(prev => prev.map(course => {
                    if (course.id === currentCourseId) {
                        const newSections = [...course.sections]
                        const [draggedSection] = newSections.splice(draggedSectionIndex, 1)
                        newSections.splice(targetIndex, 0, draggedSection)
                        return { ...course, sections: newSections }
                    }
                    return course
                }))
                setDraggedSectionIndex(null)
            }

            const handleImageUpload = (e) => {
                const file = e.target.files?.[0]
                if (file) {
                    if (file.type !== 'image/png') {
                        addToast('يرجى اختيار ملف بصيغة PNG فقط', 'error')
                        return
                    }
                    const reader = new FileReader()
                    reader.onload = (event) => {
                        setCurrentIconBase64(event.target?.result)
                    }
                    reader.readAsDataURL(file)
                }
            }

            const filteredCourses = allCourses.filter(course => {
                const term = searchTerm.toLowerCase()
                return course.title.toLowerCase().includes(term) || course.doc.toLowerCase().includes(term)
            })

            const currentCourse = allCourses.find(c => c.id === currentCourseId)

            return (
                <div className={`min-h-screen flex flex-col transition-colors duration-300 ${theme === 'dark' ? 'dark-mode' : ''}`}>
                    {/* Toasts */}
                    <div className="toast-container">
                        {toasts.map(toast => (
                            <Toast key={toast.id} message={toast.message} type={toast.type} onClose={() => removeToast(toast.id)} />
                        ))}
                    </div>

                    {/* Header */}
                    <header>
                        <div className={`${view === 'detail' ? 'max-w-full px-4 md:px-8' : 'max-w-7xl'} mx-auto flex justify-between items-center`}>
                            <div className="flex items-center gap-3 text-2xl font-black text-[var(--primary-dark)] cursor-pointer" onClick={showHome}>
                                <i className="fa-solid fa-network-wired text-[var(--accent)]"></i> CCE Hub
                            </div>
                            
                            <div className="flex items-center gap-4">
                                <button className="icon-btn" onClick={toggleTheme} title="تغيير الثيم">
                                    <i className={`fa-solid ${theme === 'light' ? 'fa-moon' : 'fa-sun'}`}></i>
                                </button>
                                <div className="relative w-full max-w-[300px] hidden md:block">
                                    <input
                                        type="text"
                                        className="search-input"
                                        placeholder="ابحث عن مادة..."
                                        value={searchTerm}
                                        onChange={(e) => setSearchTerm(e.target.value)}
                                    />
                                    <i className="fa-solid fa-search absolute right-4 top-1/2 -translate-y-1/2 text-[var(--text-secondary)]"></i>
                                </div>
                            </div>
                        </div>
                        <div className="md:hidden px-4 mt-3">
                            <input
                                type="text"
                                className="search-input"
                                placeholder="ابحث عن مادة..."
                                value={searchTerm}
                                onChange={(e) => setSearchTerm(e.target.value)}
                            />
                        </div>
                    </header>

                    <main className={`${view === 'detail' ? 'w-full px-4 md:px-8' : 'max-w-7xl'} mx-auto py-10 flex-1 min-h-[70vh]`}>
                        {/* Home View */}
                        {view === 'home' && (
                            <div>
                                <div className="text-center mb-10">
                                    <h1 className="text-4xl md:text-5xl font-black mb-3 text-[var(--text-primary)]">مكتبة مواد اعدادي هندسة</h1>
                                    <p className="text-[var(--text-secondary)] text-lg font-medium">النظام الموحد لإدارة المواد</p>
                                </div>

                                <div className="text-center">
                                    <button className="add-course-btn-main" onClick={openCourseModal}>
                                        <i className="fa-solid fa-plus-circle"></i> إضافة مقرر جديد
                                    </button>
                                </div>

                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8 mt-12">
                                    {filteredCourses.map((course, index) => (
                                        <div
                                            key={course.id}
                                            className={`material-card`}
                                            onClick={(e) => {
                                                if (!e.target.closest('.card-actions') && !e.target.closest('.course-drag-handle')) {
                                                    openDetail(course.id)
                                                }
                                            }}
                                        >
                                            <div className="card-actions absolute top-4 left-4 flex gap-2 opacity-0 hover:opacity-100 z-10 transition-opacity">
                                                <button className="action-btn" onClick={(e) => { e.stopPropagation(); openEditCourseModal(course.id) }} title="تعديل">
                                                    <i className="fa-solid fa-pen"></i>
                                                </button>
                                                <button className="action-btn delete" onClick={(e) => { e.stopPropagation(); deleteCourse(course.id) }} title="حذف">
                                                    <i className="fa-solid fa-trash"></i>
                                                </button>
                                            </div>
                                            
                                            <div className="fixed-icon-container">
                                                {course.icon.startsWith('data:image') ? (
                                                    <img src={course.icon} alt={course.title} />
                                                ) : (
                                                    <i className={`fa-solid ${course.icon}`}></i>
                                                )}
                                            </div>
                                            
                                            <div className="font-bold text-xl text-[var(--text-primary)] mb-1">{course.title}</div>
                                            <div className="text-base text-[var(--text-secondary)] font-medium">{course.doc}</div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* Detail View */}
                        {view === 'detail' && currentCourse && (
                            <div className="w-full">
                                <button className="bg-[var(--bg-card)] border border-[var(--border-color)] text-[var(--text-secondary)] px-6 py-3 rounded-xl cursor-pointer font-bold flex items-center gap-3 mb-8 hover:bg-[var(--primary)] hover:text-white hover:border-[var(--primary)] transition-all shadow-sm" onClick={showHome}>
                                    <i className="fa-solid fa-arrow-right"></i> عودة للقائمة
                                </button>
                                
                                <div className="max-w-4xl mx-auto bg-[var(--bg-card)] p-10 rounded-3xl shadow-sm text-center border border-[var(--border-color)] mb-12">
                                    <div className="fixed-icon-container !w-24 !h-24 !text-5xl !mb-6 !shadow-xl">
                                        {currentCourse.icon.startsWith('data:image') ? (
                                            <img src={currentCourse.icon} alt={currentCourse.title} />
                                        ) : (
                                            <i className={`fa-solid ${currentCourse.icon}`}></i>
                                        )}
                                    </div>
                                    <h2 className="text-4xl font-black text-[var(--primary-dark)] mb-2">{currentCourse.title}</h2>
                                    <p className="text-xl text-[var(--text-secondary)] mb-8 font-medium">{currentCourse.doc}</p>
                                    
                                    <div className="flex justify-center gap-4 flex-wrap">
                                        <button className="bg-[var(--text-secondary)] text-white border-none px-6 py-3 rounded-xl cursor-pointer flex items-center gap-2 hover:opacity-90 font-bold shadow-md transition-transform hover:-translate-y-1" onClick={() => openEditCourseModal(currentCourse.id)}>
                                            <i className="fa-solid fa-pen"></i> تعديل بيانات المقرر
                                        </button>
                                        <button className="bg-[var(--accent)] text-white border-none px-6 py-3 rounded-xl cursor-pointer flex items-center gap-2 hover:opacity-90 font-bold shadow-md transition-transform hover:-translate-y-1" onClick={() => openLinkModal(null)}>
                                            <i className="fa-solid fa-plus"></i> إضافة رابط / قسم جديد
                                        </button>
                                    </div>
                                </div>

                                {/* Notes Board Section */}
                                <div className="max-w-6xl mx-auto mb-12">
                                    <div className="flex justify-between items-center mb-6 px-2">
                                        <h3 className="text-2xl font-bold text-[var(--text-primary)] flex items-center gap-3">
                                            <i className="fa-solid fa-clipboard-list text-[#f59e0b]"></i>
                                            سجل الملاحظات
                                        </h3>
                                        <button className="btn-add-note" onClick={openAddNoteModal}>
                                            <i className="fa-solid fa-plus"></i> ملاحظة جديدة
                                        </button>
                                    </div>
                                    
                                    {currentCourse.notes && currentCourse.notes.length > 0 ? (
                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                            {currentCourse.notes.map((note) => (
                                                <div key={note.id} className="note-card">
                                                    <div className="text-lg font-medium whitespace-pre-wrap break-words leading-relaxed">{note.content}</div>
                                                    <div className="note-date">
                                                        <span className="text-sm">{formatDate(note.createdAt)}</span>
                                                        <div className="flex gap-3 text-lg">
                                                            <button onClick={() => openEditNoteModal(note)} className="hover:text-[var(--primary)] transition-colors"><i className="fa-solid fa-pen"></i></button>
                                                            <button onClick={() => deleteNote(note.id)} className="hover:text-[var(--danger)] transition-colors"><i className="fa-solid fa-trash"></i></button>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    ) : (
                                        <div className="text-center py-12 border-2 border-dashed border-[var(--border-color)] rounded-2xl text-[var(--text-secondary)] bg-[var(--bg-card)] text-lg font-medium">
                                            لا توجد ملاحظات بعد.
                                        </div>
                                    )}
                                </div>

                                <div className="w-full max-w-5xl mx-auto">
                                    {currentCourse.sections.length === 0 ? (
                                        <div className="text-center text-[var(--text-secondary)] py-12 text-lg border-2 border-dashed border-[var(--border-color)] rounded-2xl bg-[var(--bg-card)]">لا توجد أقسام أو روابط مضافة.</div>
                                    ) : (
                                        currentCourse.sections.map((section, sIndex) => (
                                            <div key={sIndex} className="bg-[var(--bg-card)] rounded-2xl border border-[var(--border-color)] overflow-hidden shadow-sm mb-8">
                                                <div className="bg-[var(--bg-body)] p-4 border-b border-[var(--border-color)] flex justify-between items-center flex-wrap gap-3">
                                                    <div className="flex items-center gap-4 flex-1 min-w-0">
                                                        <span className="font-bold text-[var(--primary)] text-xl truncate flex-1">{section.name}</span>
                                                        {section.badge && <span className="text-xs bg-[var(--accent)] text-white px-3 py-1 rounded-full font-bold shadow-sm">{section.badge}</span>}
                                                    </div>
                                                    <div className="flex gap-2">
                                                        <button className="action-btn" onClick={() => openLinkModal(sIndex)} title="إضافة رابط"><i className="fa-solid fa-plus"></i></button>
                                                        <button className="action-btn" onClick={() => editSectionName(currentCourse.id, sIndex)} title="تعديل الاسم"><i className="fa-solid fa-pen"></i></button>
                                                        <button className="action-btn delete" onClick={() => deleteSection(currentCourse.id, sIndex)} title="حذف الخانة"><i className="fa-solid fa-trash"></i></button>
                                                    </div>
                                                </div>
                                                <ul className="list-none p-0">
                                                    {section.links.map((link, lIndex) => (
                                                        <li key={lIndex} className="track-item">
                                                            <div className="text-[var(--text-secondary)] ml-4 text-lg"><i className="fa-solid fa-link"></i></div>
                                                            <div className="flex-grow overflow-hidden" onClick={() => window.open(link.url, '_blank')}>
                                                                <span className="font-bold text-base truncate block">{link.name}</span>
                                                            </div>
                                                            
                                                            <button 
                                                                className="bg-transparent border-none text-[var(--text-secondary)] cursor-pointer ml-4 hover:text-[var(--accent)] transition-colors flex-shrink-0 text-lg p-2" 
                                                                onClick={(e) => { e.stopPropagation(); window.open(link.url, '_blank'); }}
                                                                title="فتح الرابط"
                                                            >
                                                                <i className="fa-solid fa-up-right-from-square"></i>
                                                            </button>
                                                            
                                                            <button className="bg-transparent border-none text-[var(--text-secondary)] cursor-pointer ml-4 hover:text-[var(--primary)] transition-colors flex-shrink-0 text-lg p-2" onClick={() => openEditLinkModal(currentCourse.id, sIndex, lIndex)}><i className="fa-solid fa-pen"></i></button>
                                                            <button className="bg-transparent border-none text-[var(--text-secondary)] cursor-pointer ml-4 hover:text-[var(--danger)] transition-colors flex-shrink-0 text-lg p-2" onClick={() => deleteLink(currentCourse.id, sIndex, lIndex)}><i className="fa-solid fa-trash"></i></button>
                                                        </li>
                                                    ))}
                                                </ul>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="text-center py-10 text-[var(--text-secondary)] text-base border-t border-[var(--border-color)] bg-[var(--bg-card)] mt-10">
                        <p className="font-medium">made by abdallah elmohammady</p>
                    </footer>

                    {/* Modals */}
                    {courseModalOpen && (
                        <div className="modal-backdrop" role="dialog" onClick={() => setCourseModalOpen(false)}>
                            <div onClick={e => e.stopPropagation()}>
                                <h2 className="text-3xl font-black text-[var(--primary-dark)] mb-8 text-center">
                                    {editingCourseId ? 'تعديل بيانات المقرر' : 'إضافة مقرر جديد'}
                                </h2>
                                
                                <div className="mb-8">
                                    <label className="block mb-3 font-bold text-[var(--text-primary)] text-lg">اسم المقرر</label>
                                    <input className="form-input" value={courseName} onChange={(e) => setCourseName(e.target.value)} placeholder="مثال: فيزياء الحالة الصلبة" />
                                </div>
                                
                                <div className="mb-8">
                                    <label className="block mb-3 font-bold text-[var(--text-primary)] text-lg">اسم الدكتور / الملاحظة</label>
                                    <input className="form-input" value={courseDoc} onChange={(e) => setCourseDoc(e.target.value)} placeholder="مثال: دكتور فلان" />
                                </div>
                                
                                <div className="mb-8">
                                    <label className="block mb-3 font-bold text-[var(--text-primary)] text-lg">أيقونة المقرر (اختياري - PNG)</label>
                                    <div className="flex items-center gap-4 flex-wrap">
                                        <button type="button" className="bg-[var(--bg-body)] text-[var(--text-primary)] border-2 border-dashed border-[var(--border-color)] px-6 py-4 rounded-xl cursor-pointer font-bold hover:border-[var(--primary)] hover:text-[var(--primary)] transition-colors flex items-center gap-3 text-lg" onClick={() => fileInputRef.current?.click()}>
                                            <i className="fa-solid fa-image"></i> رفع صورة
                                        </button>
                                        {currentIconBase64 && <div className="w-20 h-20 rounded-full overflow-hidden border-4 border-[var(--border-color)] flex-shrink-0 shadow-md"><img src={currentIconBase64} alt="Preview" className="w-full h-full object-cover" /></div>}
                                        <input ref={fileInputRef} type="file" accept="image/png" onChange={handleImageUpload} style={{ display: 'none' }} />
                                    </div>
                                </div>

                                <div className="mt-10 pt-6 border-t border-[var(--border-color)] flex justify-end gap-4 flex-wrap">
                                    {editingCourseId && <button className="btn-delete" onClick={() => { if(confirm('هل أنت متأكد؟')) { deleteCourse(editingCourseId); setCourseModalOpen(false); showHome(); } }}>حذف المقرر</button>}
                                    <div className="flex-grow"></div>
                                    <button className="btn-cancel" onClick={() => setCourseModalOpen(false)}>إلغاء</button>
                                    <button className="btn-save" onClick={saveCourseData}>حفظ</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {noteModalOpen && (
                        <div className="modal-backdrop" role="dialog" onClick={() => setNoteModalOpen(false)}>
                            <div onClick={e => e.stopPropagation()}>
                                <h2 className="text-3xl font-black text-[var(--primary-dark)] mb-8 text-center">
                                    {editingNoteId ? 'تعديل الملاحظة' : 'إضافة ملاحظة جديدة'}
                                </h2>
                                <div className="mb-8">
                                    <textarea className="form-input min-h-[180px]" value={tempNoteContent} onChange={(e) => setTempNoteContent(e.target.value)} placeholder="اكتب ملاحظاتك هنا..."></textarea>
                                </div>
                                <div className="mt-10 pt-6 border-t border-[var(--border-color)] flex justify-end gap-4">
                                    <button className="btn-cancel" onClick={() => setNoteModalOpen(false)}>إلغاء</button>
                                    <button className="btn-save" onClick={saveNote}>حفظ</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {linkModalOpen && (
                        <div className="modal-backdrop" role="dialog" onClick={() => setLinkModalOpen(false)}>
                            <div onClick={e => e.stopPropagation()}>
                                <h2 className="text-3xl font-black text-[var(--primary-dark)] mb-8 text-center">
                                    {targetSectionIndex !== null ? 'إضافة رابط' : 'إضافة خانة جديدة'}
                                </h2>
                                <div className="mb-8">
                                    <label className="block mb-3 font-bold text-[var(--text-primary)] text-lg">اسم الرابط</label>
                                    <input className="form-input" value={linkName} onChange={(e) => setLinkName(e.target.value)} placeholder="اسم الرابط" />
                                </div>
                                <div className="mb-8">
                                    <label className="block mb-3 font-bold text-[var(--text-primary)] text-lg">الرابط</label>
                                    <input className="form-input" value={linkUrl} onChange={(e) => setLinkUrl(e.target.value)} placeholder="https://..." />
                                </div>
                                <div className="mt-10 pt-6 border-t border-[var(--border-color)] flex justify-end gap-4">
                                    <button className="btn-cancel" onClick={() => setLinkModalOpen(false)}>إلغاء</button>
                                    <button className="btn-save" onClick={saveLinkData}>حفظ الرابط</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {editLinkModalOpen && (
                        <div className="modal-backdrop" role="dialog" onClick={() => setEditLinkModalOpen(false)}>
                            <div onClick={e => e.stopPropagation()}>
                                <h2 className="text-3xl font-black text-[var(--primary-dark)] mb-8 text-center">تعديل الرابط</h2>
                                <div className="mb-8">
                                    <label className="block mb-3 font-bold text-[var(--text-primary)] text-lg">اسم الرابط</label>
                                    <input className="form-input" value={editLinkName} onChange={(e) => setEditLinkName(e.target.value)} />
                                </div>
                                <div className="mb-8">
                                    <label className="block mb-3 font-bold text-[var(--text-primary)] text-lg">الرابط</label>
                                    <input className="form-input" value={editLinkUrl} onChange={(e) => setEditLinkUrl(e.target.value)} />
                                </div>
                                <div className="mt-10 pt-6 border-t border-[var(--border-color)] flex justify-end gap-4">
                                    <button className="btn-cancel" onClick={() => setEditLinkModalOpen(false)}>إلغاء</button>
                                    <button className="btn-save" onClick={saveEditedLink}>حفظ التعديلات</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CCEHub />);
    </script>
</body>
</html>
